<!DOCTYPE html>
<html lang="pt-br" data-theme="dark" xmlns:th="http://www.thymeleaf.org"
      xmlns:x-transition="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lmix.top | Dev Tools</title>
    <th:block th:replace="~{fragments :: head-comum}"></th:block>
    <style>
        [x-cloak] {
            display: none !important;
        }

        body {
            overflow-x: hidden;
        }

        .grid {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>

<body class="bg-base-100 min-h-screen flex flex-col">
    <div th:replace="~{fragments :: navbar-principal}"></div>

    <main class="flex-grow overflow-x-hidden">
        <!-- HERO -->
        <section class="hero bg-base-200 py-20 pt-32 border-b border-base-300">
            <div class="hero-content text-center">
                <div class="max-w-2xl px-4">
                    <h1 class="text-4xl md:text-5xl font-bold">
                        O canivete suíço do <span class="text-primary">Desenvolvedor</span>
                    </h1>
                    <p class="py-6 text-lg md:text-xl text-base-content/70">
                        Ferramentas rápidas, seguras e open-source para o seu workflow diário.
                    </p>
                    <a href="#ferramentas" class="btn btn-primary shadow-lg">
                        Começar a usar
                    </a>
                </div>
            </div>
        </section>

        <!-- FERRAMENTAS -->
        <section id="ferramentas" class="py-16 px-4 md:px-10 max-w-7xl mx-auto w-full" x-data="{
                     search: '',
                     ferramentas: [
                         { nome: 'Encurtador de URL', cat: 'Web', cor: 'primary', emoji: '🔗', desc: 'Links curtos e rastreáveis.', link: '/encurtador', acao: 'Abrir' },
                         { nome: 'Gerador de QRCode', cat: 'Web', cor: 'primary', emoji: '📱', desc: 'Crie QRCodes para links ou Wi-Fi.', link: '/qrcode', acao: 'Gerar' },
                         { nome: 'Teste de IP', cat: 'Web', cor: 'primary', emoji: '🌐', desc: 'Verifique seu IP e geolocalização.', link: '/ip', acao: 'Verificar' },
                         { nome: 'Conversor de JSON', cat: 'Dados', cor: 'secondary', emoji: '📦', desc: 'Formate e valide seu JSON.', link: '/json', acao: 'Converter' },
                         { nome: 'Binário Para Texto', cat: 'Dados', cor: 'secondary', emoji: '🔢', desc: 'Traduza sequências binárias.', link: '/binario', acao: 'Traduzir' },
                         { nome: 'Hasheadores', cat: 'Dados', cor: 'secondary', emoji: '🔐', desc: 'Gere hashes MD5, SHA-1 e SHA-256.', link: '/hash', acao: 'Hashear' },
                         { nome: 'Testador de Cron', cat: 'Dev', cor: 'accent', emoji: '⏰', desc: 'Valide expressões Cron.', link: '/cron', acao: 'Testar' },
                         { nome: 'Gerador de UUID', cat: 'Dev', cor: 'accent', emoji: '🆔', desc: 'Gere identificadores únicos V4.', link: '/uuid', acao: 'Gerar' }
                     ],
                     filtrar(item) {
                         return item.nome.toLowerCase().includes(this.search.toLowerCase()) ||
                                item.cat.toLowerCase().includes(this.search.toLowerCase());
                     }
                 }">

            <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
                <div class="text-center md:text-left">
                    <h2 class="text-3xl font-bold">As nossas Ferramentas</h2>
                    <p class="text-base-content/60 italic">O que você deseja processar hoje?</p>
                </div>

                <div class="relative w-full md:w-80">
                    <input type="text" x-model="search" placeholder="Buscar ferramenta (ex: JSON, IP...)"
                        class="input input-bordered w-full pl-10 focus:border-primary shadow-sm ring-primary/10 focus:ring-4 transition-all" />
                    <span class="absolute left-3 top-3.5 opacity-40">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </span>
                    <button x-show="search.length > 0" @click="search = ''" x-cloak
                        class="absolute right-3 top-3 btn btn-ghost btn-xs btn-circle">✕</button>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 items-start">
                <template x-for="item in ferramentas" :key="item.nome">
                    <div x-show="filtrar(item)" x-transition:enter="transition ease-out duration-300"
                        x-transition:enter-start="opacity-0 scale-90" x-transition:enter-end="opacity-100 scale-100"
                        x-data="{ hover: false }" @mouseenter="hover = true" @mouseleave="hover = false" class="h-full">

                        <div class="card bg-base-100 shadow-xl border transition-all duration-300 h-full" :class="{
                            'border-primary -translate-y-2 shadow-2xl': hover && item.cor === 'primary',
                            'border-secondary -translate-y-2 shadow-2xl': hover && item.cor === 'secondary',
                            'border-accent -translate-y-2 shadow-2xl': hover && item.cor === 'accent',
                            'border-base-300': !hover
                         }">
                            <div class="card-body p-6">
                                <div class="flex justify-between items-start">
                                    <span class="text-4xl transition-transform duration-300"
                                        :class="hover ? 'scale-125 rotate-12' : ''" x-text="item.emoji"></span>
                                    <div class="badge badge-outline text-xs" :class="'badge-' + item.cor"
                                        x-text="item.cat"></div>
                                </div>
                                <h2 class="card-title mt-2" :class="'text-' + item.cor" x-text="item.nome"></h2>
                                <p class="text-sm opacity-70 leading-relaxed" x-text="item.desc"></p>
                                <div class="card-actions justify-end mt-6">
                                    <a :href="item.link" class="btn btn-sm no-animation"
                                        :class="hover ? 'btn-' + item.cor + (item.cor === 'secondary' ? ' text-white' : '') : 'btn-ghost border-base-300'">
                                        <span x-text="item.acao"></span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div x-show="ferramentas.filter(i => filtrar(i)).length === 0" x-cloak
                class="text-center py-20 bg-base-100/30 rounded-3xl border-2 border-dashed border-base-300">
                <span class="text-6xl block mb-4">🔍</span>
                <p class="text-xl opacity-60">Nenhuma ferramenta encontrada para "<span x-text="search"
                        class="font-bold text-primary"></span>"</p>
                <button @click="search = ''" class="btn btn-link btn-primary mt-2">Limpar busca</button>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments :: footer-principal}"></div>
</body>

</html>
