<!DOCTYPE html>
<html lang="pt-br" data-theme="dark" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QRCode | lmix.top</title>
    <th:block th:replace="~{fragments :: head-comum}"></th:block>

    <style>
        [x-cloak] { display: none !important; }
        .transparent-bg {
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #ccc 75%), 
                              linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
    <link rel="icon" th:href="@{/imgs/favicon.ico}">
</head>

<body class="bg-base-100 min-h-screen flex flex-col" x-data="qrCodeTool()">
    <div th:replace="~{fragments :: navbar-principal}"></div>

    <main class="flex-grow container mx-auto px-4 pt-24 pb-10 max-w-6xl">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold mb-2">📱 Gerador de <span class="text-primary">QRCode</span></h1>
            <p class="opacity-70">Crie QRCodes personalizados em alta resolução.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Configurações -->
            <div class="card bg-base-200 shadow-xl border border-base-300 lg:col-span-1 h-fit">
                <div class="card-body">
                    <h2 class="card-title text-primary mb-4">Configurações</h2>
                    
                    <!-- Texto/URL -->
                    <div class="form-control w-full">
                        <label class="label"><span class="label-text">Conteúdo (URL ou Texto)</span></label>
                        <textarea x-model="text" @input.debounce.500ms="generate()"
                            placeholder="https://exemplo.com ou Texto..."
                            class="textarea textarea-bordered textarea-primary h-32"></textarea>
                    </div>

                    <!-- Tamanho -->
                    <div class="form-control w-full mt-4">
                        <label class="label">
                            <span class="label-text">Tamanho: <span x-text="size + 'px'"></span></span>
                        </label>
                        <input type="range" min="128" max="2048" step="128" x-model="size" @change="generate()" class="range range-primary range-xs" />
                        <div class="w-full flex justify-between text-xs px-2 mt-1 opacity-50">
                            <span>128px</span>
                            <span>1024px</span>
                            <span>2048px</span>
                        </div>
                    </div>

                    <!-- Formato -->
                    <div class="form-control w-full mt-4">
                        <label class="label"><span class="label-text">Formato</span></label>
                        <div class="flex gap-4">
                            <label class="label cursor-pointer gap-2 border rounded-lg px-4 py-2 flex-1" :class="format === 'png' ? 'border-primary bg-primary/10' : 'border-base-300'">
                                <span class="label-text font-bold">PNG</span> 
                                <input type="radio" name="format" value="png" x-model="format" @change="generate()" class="radio radio-primary radio-sm" />
                            </label>
                            <label class="label cursor-pointer gap-2 border rounded-lg px-4 py-2 flex-1" :class="format === 'jpg' ? 'border-primary bg-primary/10' : 'border-base-300'">
                                <span class="label-text font-bold">JPG</span> 
                                <input type="radio" name="format" value="jpg" x-model="format" @change="generate()" class="radio radio-primary radio-sm" />
                            </label>
                        </div>
                    </div>

                    <!-- Fundo Transparente (Apenas PNG) -->
                    <div class="form-control w-full mt-2" x-show="format === 'png'" x-transition>
                        <label class="cursor-pointer label justify-start gap-4">
                            <input type="checkbox" x-model="transparent" @change="generate()" class="checkbox checkbox-primary" />
                            <span class="label-text">Fundo Transparente</span>
                        </label>
                    </div>

                    <button @click="generate()" class="btn btn-primary w-full mt-6" :disabled="loading || !text">
                        <span x-show="loading" class="loading loading-spinner loading-xs"></span>
                        Atualizar QRCode
                    </button>
                </div>
            </div>

            <!-- Preview -->
            <div class="card bg-base-100 shadow-2xl border border-base-300 lg:col-span-2 flex items-center justify-center p-8 relative overflow-hidden min-h-[500px]">
                
                <div x-show="!result && !loading" class="text-center opacity-30">
                    <span class="text-9xl">📱</span>
                    <p class="mt-4 text-xl">Digite algo para gerar o QRCode</p>
                </div>

                <div x-show="loading" class="absolute inset-0 bg-base-100/80 z-10 flex items-center justify-center backdrop-blur-sm" x-transition>
                    <span class="loading loading-dots loading-lg text-primary"></span>
                </div>

                <div x-show="result" class="flex flex-col items-center gap-6 z-0 w-full" x-transition>
                    <div class="bg-white p-4 rounded-xl shadow-lg border-4 border-base-300 max-w-full overflow-auto" 
                         :class="transparent ? 'transparent-bg' : ''">
                        <img :src="result" class="max-h-[500px] object-contain mx-auto" alt="QRCode Gerado" />
                    </div>
                    
                    <div class="flex gap-4">
                        <a :href="result" :download="'qrcode-lmix-' + size + '.' + format" class="btn btn-primary gap-2 shadow-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                            Baixar Imagem
                        </a>
                        
                        <button @click="copyImage()" class="btn btn-ghost gap-2 border-base-300">
                             <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                            </svg>
                            Copiar
                        </button>
                    </div>
                    
                    <div class="stats shadow bg-base-200 mt-4">
                        <div class="stat place-items-center">
                            <div class="stat-title">Dimensão</div>
                            <div class="stat-value text-xl font-mono" x-text="size + 'x' + size"></div>
                        </div>
                        <div class="stat place-items-center">
                            <div class="stat-title">Formato</div>
                            <div class="stat-value text-xl uppercase text-primary" x-text="format"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments :: footer-principal}"></div>

    <script>
        function qrCodeTool() {
            return {
                text: '',
                size: 512,
                format: 'png',
                transparent: false,
                loading: false,
                result: null, // Data URL completo (data:image/png;base64,...)
                
                async generate() {
                    if (!this.text) {
                        this.result = null;
                        return;
                    }

                    this.loading = true;
                    try {
                        const response = await fetch('/genQrCode', { 
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                text: this.text,
                                size: parseInt(this.size),
                                format: this.format,
                                transparent: this.transparent && this.format === 'png'
                            })
                        });

                        if (response.ok) {
                            const data = await response.json();
                            this.result = 'data:' + data.mimeType + ';base64,' + data.imageBase64;
                        } else {
                            console.error('Erro ao gerar QRCode');
                        }
                    } catch (e) {
                        console.error('Erro de conexão', e);
                    } finally {
                        this.loading = false;
                    }
                },
                
                async copyImage() {
                    if (!this.result) return;
                    try {
                        const res = await fetch(this.result);
                        const blob = await res.blob();
                        await navigator.clipboard.write([
                            new ClipboardItem({ [blob.type]: blob })
                        ]);
                        // Feedback visual poderia ser adicionado aqui
                        alert('Imagem copiada para a área de transferência!');
                    } catch (e) {
                        console.error('Falha ao copiar imagem:', e);
                        alert('Seu navegador não suporta cópia direta de imagens.');
                    }
                }
            }
        }
    </script>
</body>
</html>
